services:
  pipeline:
    build: .
    volumes:
      - .:/app
      - /path/to/your/local/data:/app/data  # mude para seu caminho real de WSI
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: bash
